name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ steps.vars.outputs.sha_short }}

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ steps.vars.outputs.sha_short }}
  deploy:
    runs-on: self-hosted
    needs: build-and-push
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Pull and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          SHA: ${{ needs.build-and-push.outputs.sha_short }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          username: ${{secrets.SSH_USER}}
          key: ${{ secrets.SSH_KEY }}
          host: ${{secrets.HOSTIP}}
          script: |
          mkdir -p ~/app/deploy
          cd ~/app/deploy

          # Create docker-compose.yml directly
          cat > docker-compose.yml <<EOF
services:
  frontend:
    image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ needs.build-and-push.outputs.sha_short }}

  backend:
    image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ needs.build-and-push.outputs.sha_short }}

  nginx:
    image: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ needs.build-and-push.outputs.sha_short }}
EOF

          # Log in to Docker Hub
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          # Pull new images and run containers
          docker compose pull
          docker compose up -d
          docker image prune -f
