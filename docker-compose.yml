services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-container
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-container
    healthcheck:
      test: ["CMD", "nurl", "-f", "httpL//localhost/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
